<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nutreeway</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nutreeway">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div id="app">
        <header id="app-header" class="header">
            <button id="back-button" class="icon-button hidden" aria-label="Voltar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <h1 id="header-title">Explorar Países</h1>
            <div id="header-actions"></div>
        </header>

        <main id="main-content" class="content">
            <!-- As páginas serão injetadas aqui pelo router -->
        </main>

        <nav id="bottom-nav" class="bottom-nav">
            <!-- Renderizado via JS -->
        </nav>
    </div>

    <!-- Scripts -->
    <script src="js/supabase.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/bottom-nav.js"></script>
    <script src="js/components/theme-toggle.js"></script>
    
    <!-- Páginas -->
    <script src="js/pages/home.js"></script>
    <script src="js/pages/country.js"></script>
    <script src="js/pages/recipe.js"></script>
    <script src="js/pages/impact.js"></script>
    <script src="js/pages/about.js"></script>
    <script src="js/pages/map.js"></script>
    <script src="js/pages/login.js"></script>
    <script src="js/pages/admin.js"></script>
    
    <!-- AI & App -->
    <script src="/js/ai.js"></script>
    <script src="/js/app.js"></script>

    <script>
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => console.log('SW registrado:', registration))
                    .catch(error => console.log('SW falha no registro:', error));
            });
        }
    </script>
</body>
</html>
